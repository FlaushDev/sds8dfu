<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Technologie Test</title>
</head>

<body style="background-color: lightblue;">

    <h1>Max Mustermann – 3AHIT</h1>

    <h2>Persönliche Daten</h2>
    <p>
        Geburtsdatum: 15.04.2008<br>
        Lieblingsfarbe: Hellblau
    </p>

    <h2>Meine Lieblingsfächer</h2>
    <ol>
        <li>Webtechnologie</li>
        <li>Programmieren</li>
        <li>Netzwerktechnik</li>
    </ol>

    <h2>Meine Hobbys</h2>
    <ul id="liste-hobbys"></ul>

    <h2>Freies Bild</h2>
    <figure>
        <img
            src="img/bild1.jpg"
            alt="Landschaft mit Bergen und See"
            title="Freies Bild"
            width="400"
        >
        <figcaption>
            Foto von
            <a href="https://commons.wikimedia.org/wiki/User:Beispiel" target="_blank">Max Beispiel</a>
            –
            <a href="https://commons.wikimedia.org/wiki/File:Beispielbild.jpg" target="_blank">Mountain Lake</a>
            –
            <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a>
        </figcaption>
    </figure>

    <script>
        const hobbys = ["Gaming", "Fußball", "Musik hören", "Max Mustermann"];

        const liste = document.getElementById("liste-hobbys");

        hobbys.forEach(h => {
            let li = document.createElement("li");
            li.textContent = h;
            liste.appendChild(li);
        });
    </script>

</body>
</html>
